<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Department</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Courier+Prime:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/floorplan.css">
</head>
<body>

  <!-- ===== THREE-PANEL LAYOUT ===== -->
  <div id="game-container">

    <!-- LEFT PANEL: Click Zone + Stats -->
    <aside id="panel-left" class="panel">

      <h1 id="dept-name" class="dept-name" title="Double-click to rename">The Department</h1>

      <!-- Stamp & Form Area -->
      <div id="click-zone">
        <div id="stamp" class="stamp">
          <span class="stamp-text">APPROVED</span>
        </div>
        <div id="form-box" class="form-box">
          <div class="form-lines">
            <div class="form-line"></div>
            <div class="form-line"></div>
            <div class="form-line"></div>
            <div class="form-line"></div>
            <div class="form-line"></div>
            <div class="form-line"></div>
            <div class="form-line"></div>
            <div class="form-line"></div>
          </div>
          <div class="form-header">FORM 7-B</div>
        </div>
      </div>

      <!-- Stats -->
      <div id="stats">
        <div class="stat-row">
          <span class="stat-label">Forms</span>
          <span id="forms-total" class="stat-value">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Forms/click</span>
          <span id="forms-per-click" class="stat-value">1</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Forms/sec</span>
          <span id="forms-per-sec" class="stat-value">0.0</span>
        </div>
        <div class="stat-row" id="directives-row" style="display:none">
          <span class="stat-label">Directives ◈</span>
          <span id="directives-total" class="stat-value">0</span>
        </div>
        <div class="stat-row" id="precedents-row" style="display:none">
          <span class="stat-label">Precedents ⌖</span>
          <span id="precedents-total" class="stat-value">0</span>
        </div>
      </div>

      <!-- Active Buffs (shown when event buffs are active) -->
      <div id="active-buffs" style="display:none"></div>

      <!-- Directives Conversion (hidden until unlocked) -->
      <div id="convert-section" style="display:none">
        <div class="qty-toggle" id="convert-qty-toggle">
          <span class="qty-label">Convert:</span>
          <button class="qty-btn active" data-qty="1">x1</button>
          <button class="qty-btn" data-qty="10">x10</button>
          <button class="qty-btn" data-qty="50">x50</button>
          <button class="qty-btn" data-qty="100">x100</button>
          <button class="qty-btn" data-qty="max">MAX</button>
        </div>
        <button id="btn-convert" class="btn-convert" disabled>
          Convert ✦ 500 → ◈ 1
        </button>
      </div>

    </aside>

    <!-- CENTRE PANEL: Tabbed admin views (Floor Plan default) -->
    <main id="panel-centre" class="panel">
      <div id="centre-tabs">
        <button class="centre-tab active" data-centre-tab="floorplan">The Floor Plan</button>
        <button class="centre-tab" data-centre-tab="registry">The Registry</button>
        <button class="centre-tab" data-centre-tab="honours">Honours Board</button>
        <button class="centre-tab locked" data-centre-tab="restructuring" disabled title="Locked — purchase 'The Reorganisation' to unlock">Restructuring</button>
        <button class="centre-tab" data-centre-tab="operations">Operations</button>
      </div>
      <div id="centre-views">
        <div id="centre-view-floorplan" class="centre-view active">
          <div id="floor-plan">
            <!-- Rooms and corridors rendered dynamically by floorplan.js -->
          </div>
        </div>
        <div id="centre-view-registry" class="centre-view"></div>
        <div id="centre-view-honours" class="centre-view"></div>
        <div id="centre-view-restructuring" class="centre-view"></div>
        <div id="centre-view-operations" class="centre-view"></div>
      </div>
    </main>

    <!-- RIGHT PANEL: Departments & Upgrades Shop -->
    <aside id="panel-right" class="panel">

      <!-- Tabs -->
      <div id="shop-tabs">
        <button class="shop-tab active" data-tab="departments">Departments</button>
        <button class="shop-tab" data-tab="upgrades">Upgrades</button>
      </div>

      <!-- Departments List (rendered by ui.js) -->
      <div id="tab-departments" class="tab-content active">
        <div class="qty-toggle" id="dept-qty-toggle">
          <span class="qty-label">Buy:</span>
          <button class="qty-btn active" data-qty="1">x1</button>
          <button class="qty-btn" data-qty="10">x10</button>
          <button class="qty-btn" data-qty="50">x50</button>
          <button class="qty-btn" data-qty="100">x100</button>
          <button class="qty-btn" data-qty="max">MAX</button>
        </div>
        <div id="dept-list"></div>
      </div>

      <!-- Upgrades List (rendered by ui.js) -->
      <div id="tab-upgrades" class="tab-content"></div>

    </aside>

  </div>

  <!-- NEWS TICKER (populated by Ticker.seedInitialQueue on boot) -->
  <div id="ticker-bar">
    <div id="ticker-track"></div>
  </div>

  <!-- Scripts (no logic yet, just structure) -->
  <script src="js/game.js"></script>
  <script src="js/ticker.js"></script>
  <script src="js/departments.js"></script>
  <script src="js/upgrades.js"></script>
  <script src="js/milestones.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/floorplan.js"></script>
  <script src="js/events.js"></script>
  <script src="js/restructuring.js"></script>
  <script src="js/save.js"></script>

</body>
</html>
